version: '3.8'

services:
  api:
    build: .
    container_name: synthetic_data_api
    ports:
      - "8000:8000"
    volumes:
      - ./Dataset:/app/Dataset
      - ./models:/app/models
      - ./Synthetic Data:/app/Synthetic Data
      - ./database:/app/database
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=sqlite:///./database/synthetic_gan.db
      - USE_GPU=False
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: .
    container_name: synthetic_data_frontend
    ports:
      - "8501:8501"
    volumes:
      - ./Dataset:/app/Dataset
      - ./Synthetic Data:/app/Synthetic Data
    depends_on:
      - api
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
